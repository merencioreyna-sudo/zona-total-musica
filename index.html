<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Zona Total Música</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ================= HEADER ================= -->
    <header class="header">
        <div class="logo-container">
            <div class="logo-circle">ZT</div>
            <span class="logo-text">Música</span>
        </div>
        <a href="https://merencioreyna-sudo.github.io/zona-total-peliculas/" class="home-link"
            style="border: 1px solid rgba(255, 79, 163, 0.3);">🏠 Inicio</a>
        <div class="search-field">
            <i>🔍</i>
            <input placeholder="Search" style="	padding:10px; 
							border-radius: 50px;
                            color:magenta;
                            background-color: rgb(41, 13, 41);
                            border: none;" </div>

    </header>

    <!-- ================= CARRUSEL BANNER (AUTOMÁTICO) ================= -->
    <section class="carousel-banner">
        <div class="carousel-slides">
            <div class="carousel-slide active"
                style="background-image: url('https://www.postposmo.com/wp-content/uploads/2024/01/musica-arte.jpg');">
                <div class="carousel-overlay">
                    <h2>La música tiene identidad</h2>
                    <p>Descubre los mejores artistas y canciones</p>
                </div>
            </div>

            <div class="carousel-slide" style="background-image: url('https://wallpaperaccess.com/full/3192310.jpg');">
                <div class="carousel-overlay">
                    <h2>El ritmo que te mueve</h2>
                    <p>Descubre nuevos sonidos</p>
                </div>
            </div>

            <div class="carousel-slide"
                style="background-image: url('https://wallup.net/wp-content/uploads/2014/10/12/3D_Music_Desktop.jpg');">
                <div class="carousel-overlay">
                    <h2>Vive el ritmo</h2>
                    <p>Zona Total Música</p>
                </div>
            </div>
        </div>
        <div class="carousel-dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </section>

    <!-- ================= CATEGORÍAS (filtros) ================= -->
    <section class="categories-section">
        <div class="categories-grid" id="categories-grid">
            <button data-categoria="salsa">Salsa</button>
            <button data-categoria="pop">Pop</button>
            <button data-categoria="hip-hop">Hip-Hop</button>
            <button data-categoria="romántico">Romántico</button>
            <button data-categoria="baladas">Baladas</button>
            <button data-categoria="rock">Rock</button>
            <button data-categoria="bachata">Bachata</button>
            <button data-categoria="reggaetón">Reggaetón</button>
            <button data-categoria="house">House</button>
            <button data-categoria="variado">Variado</button>
        </div>
    </section>

    <!-- ================= TOP ZONA TOTAL (grid dinámico) ================= -->
    <section class="top-section">
        <h2 class="section-title">Top Zona Total</h2>
        <div class="top-grid" id="top-grid">
            <div class="top-card skeleton">Cargando...</div>
            <div class="top-card skeleton">Cargando...</div>
            <div class="top-card skeleton">Cargando...</div>
        </div>
    </section>

    <!-- ================= REPRODUCTOR DEBAJO DE LOS TOP ================= -->
    <div id="player-global" class="player-global" style="display: none;"></div>

    <!-- ================= ARTISTAS POR CATEGORÍA ================= -->
    <div id="categoria-artistas" class="categoria-artistas" style="display: none;">
        <h3 id="categoria-titulo" class="categoria-titulo"></h3>
        <div id="artistas-grid" class="artistas-grid"></div>
    </div>

    <!-- ================= REPRODUCTOR DE ARTISTAS ================= -->
    <div id="player-artista" class="player-artista" style="display: none;"></div>

    <!-- ================= FOOTER ================= -->
    <footer class="footer">
        <div class="footer-left">
            © 2026 Zona Total Música
        </div>
        <div class="footer-center">
            ✉️ <a href="mailto:anelistrabajo@gmail.com">anelistrabajo@gmail.com</a>
        </div>
        <div class="footer-right">
            <button id="btnAdmin">Admin</button>
            <button id="floating-btn" class="footer-music-btn">🎵 Pedir Música</button>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="script.js"></script>

    <!-- ================= MODAL PEDIR MÚSICA ================= -->
    <div id="modal-pedir" class="modal-pedir">
        <div class="modal-pedir-content">
            <span class="modal-pedir-close">&times;</span>
            <h3>Pedir una canción</h3>
            <form id="form-pedir">
                <input type="text" id="cancion-pedir" placeholder="Nombre de la canción" required>
                <input type="text" id="artista-pedir" placeholder="Artista" required>
                <button type="submit">Enviar por WhatsApp</button>
            </form>
        </div>
    </div>

</body>

</html>
